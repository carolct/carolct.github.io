<script>
  (function () {
    {% if site.google_scholar_stats_use_cdn %}
    var gsDataBaseUrl = 'https://cdn.jsdelivr.net/gh/{{ site.repository }}@';
    {% else %}
    var gsDataBaseUrl = 'https://raw.githubusercontent.com/{{ site.repository }}/';
    {% endif %}
    fetch(gsDataBaseUrl + 'google-scholar-stats/gs_data.json')
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (data) {
        if (!data || !data.publications) return;
        document.querySelectorAll('.show_paper_citations').forEach(function (el) {
          var paperId = el.getAttribute('data');
          var pub = data.publications[paperId];
          if (pub && pub.num_citations != null) {
            el.textContent = '| Citations: ' + pub.num_citations;
          }
        });
      })
      .catch(function () { /* silent */ });
  })();
</script>
