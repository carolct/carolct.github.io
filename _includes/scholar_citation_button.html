<a class="citation-link"
   href="https://scholar.google.com/citations?view_op=view_citation&hl=en&user={{ include.user }}&citation_for_view={{ include.user }}:{{ include.paper }}"
   target="_blank"
   rel="noopener">
  <span class="citation-button">
    <i class="fab fa-google-scholar citation-icon" aria-hidden="true"></i>
    <strong><span class="show_paper_citations" data="{{ include.user }}:{{ include.paper }}"></span></strong>
  </span>
</a>
